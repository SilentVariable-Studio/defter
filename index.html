<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <!-- Telefon ekranına göre ölçeklenmesi için -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defter</title>
  <style>
    /* ---- Renkler (sıcak "defter/kağıt" teması) ---- */
    :root {
      --krem: #FAEEDA;       /* sıcak krem zemin */
      --kart: #ffffff;       /* beyaz kartlar */
      --kahve-koyu: #412402; /* başlık */
      --kahve: #854F0B;      /* alt başlık / ücret etiketi yazısı */
      --amber: #BA7517;      /* buton */
      --yesil: #0F6E56;      /* kazanç / borcu yok */
      --kirmizi: #A32D2D;    /* alacak / borç */
      --soluk: #9b8a73;      /* öğrenci kartı küçük gri-kahve yazı */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: var(--krem);
      color: var(--kahve-koyu);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      /* Telefonda tek elle okunacak ölçek */
      font-size: 16px;
      line-height: 1.4;
    }

    /* Sayfayı telefon genişliğinde ortalı tut */
    .ekran {
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 18px 36px;
    }

    .baslik {
      margin: 6px 4px 22px;
    }
    .baslik h1 {
      /* Serif yazı tipi sıcaklık katar */
      font-family: Georgia, "Times New Roman", "Cambria", serif;
      font-size: 38px;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--kahve-koyu);
    }
    .baslik p {
      margin: 4px 0 0;
      color: var(--kahve);
      font-size: 14px;
    }

    /* ---- Özet kartları ---- */
    .ozet {
      display: flex;
      gap: 12px;
      margin-bottom: 26px;
    }
    .kart {
      flex: 1;
      background: var(--kart);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(65, 36, 2, 0.06);
    }
    .kart .etiket {
      font-size: 13px;
      color: var(--soluk);
      margin-bottom: 8px;
    }
    .kart .deger {
      font-size: 23px;
      font-weight: 700;
    }
    .kart.kazanc .deger { color: var(--yesil); }
    .kart.alacak .deger { color: var(--kirmizi); }

    /* ---- Öğrenci kartları ---- */
    .liste-baslik {
      font-size: 13px;
      color: var(--kahve);
      margin: 0 4px 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .ogrenci {
      background: var(--kart);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(65, 36, 2, 0.06);
    }
    .ogrenci .ust {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .ogrenci .ad {
      font-size: 18px;
      font-weight: 700;
      color: var(--kahve-koyu);
    }
    /* Ücret etiketi: krem zemin, kahve yazı, hap şekli */
    .ogrenci .ucret {
      font-size: 13px;
      color: var(--kahve);
      background: var(--krem);
      padding: 5px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* Alt satır: küçük gri yazı, üç bilgi yan yana */
    .ogrenci .alt {
      display: flex;
      gap: 6px;
      font-size: 13px;
      color: var(--soluk);
    }
    .ogrenci .alt span { white-space: nowrap; }
    .ogrenci .alt .ayrac { opacity: 0.5; }
    .ogrenci .alt .kaldi.borc { color: var(--kirmizi); font-weight: 600; }
    .ogrenci .alt .kaldi.temiz { color: var(--yesil); font-weight: 600; }

    /* ---- Boş durum mesajı ---- */
    .bos-durum {
      background: var(--kart);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      color: var(--soluk);
      font-size: 15px;
      box-shadow: 0 2px 10px rgba(65, 36, 2, 0.06);
    }

    /* ---- Öğrenci ekle butonu ---- */
    .ekle-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: var(--amber);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(186, 117, 23, 0.30);
    }
    .ekle-btn:active { transform: translateY(1px); }

    .dipnot {
      text-align: center;
      color: var(--soluk);
      font-size: 12px;
      margin-top: 20px;
    }

    /* ---- Form açılır penceresi ---- */
    .perde {
      display: none; /* açılınca flex olacak */
      position: fixed;
      inset: 0;
      background: rgba(65, 36, 2, 0.35);
      align-items: center;      /* dikeyde ortala */
      justify-content: center;  /* yatayda ortala */
      padding: 18px;
      z-index: 10;
    }
    .perde.acik { display: flex; }

    .form-panel {
      background: var(--kart);
      width: 100%;
      max-width: 380px;
      border-radius: 18px;
      padding: 22px 18px;
      box-shadow: 0 12px 40px rgba(65, 36, 2, 0.25);
    }
    .form-panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
      color: var(--kahve-koyu);
    }
    .form-alan { margin-bottom: 14px; }
    .form-alan label {
      display: block;
      font-size: 13px;
      color: var(--kahve);
      margin-bottom: 6px;
    }
    .form-alan input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #e6d9c2;
      border-radius: 12px;
      font-size: 16px;
      background: #fffdf9;
      color: var(--kahve-koyu);
    }
    .form-alan input:focus {
      outline: none;
      border-color: var(--amber);
    }

    /* Doğrulama uyarısı */
    .uyari {
      display: none;
      background: #fbe9e7;
      color: var(--kirmizi);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .uyari.gorun { display: block; }

    .form-butonlar {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .form-butonlar button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-kaydet { background: var(--amber); color: #fff; }
    .btn-vazgec { background: var(--krem); color: var(--kahve); }
    .form-butonlar button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="ekran">
    <div class="baslik">
      <h1>Defter</h1>
      <p>Özel ders kazanç takibi</p>
    </div>

    <!-- Özet kartları -->
    <div class="ozet">
      <div class="kart kazanc">
        <div class="etiket">Bu ay kazanç</div>
        <div class="deger" id="ozet-kazanc">—</div>
      </div>
      <div class="kart alacak">
        <div class="etiket">Toplam alacak</div>
        <div class="deger" id="ozet-alacak">—</div>
      </div>
    </div>

    <div class="liste-baslik">Öğrenciler</div>
    <div id="liste"><!-- Öğrenci kartları buraya yazılır --></div>

    <button class="ekle-btn" type="button" id="ekle-btn">+ Öğrenci ekle</button>
  </div>

  <!-- Öğrenci ekleme formu (açılır panel) -->
  <div class="perde" id="perde">
    <div class="form-panel">
      <h2>Yeni öğrenci</h2>

      <div class="uyari" id="uyari"></div>

      <div class="form-alan">
        <label for="alan-ad">Öğrenci adı</label>
        <input type="text" id="alan-ad" placeholder="Örn. Ayşe Yılmaz" autocomplete="off" />
      </div>
      <div class="form-alan">
        <label for="alan-ucret">Ders ücreti (₺)</label>
        <input type="number" id="alan-ucret" placeholder="Örn. 300" inputmode="numeric" min="0" />
      </div>

      <div class="form-butonlar">
        <button type="button" class="btn-vazgec" id="btn-vazgec">Vazgeç</button>
        <button type="button" class="btn-kaydet" id="btn-kaydet">Kaydet</button>
      </div>
    </div>
  </div>

  <script>
    // =========================================================
    //  KALICI KAYIT — öğrenciler cihazda localStorage'da saklanır.
    //  Her öğrenci: { ad, dersUcreti, dersSayisi, odenenToplam }
    //  Kalan borç = dersSayisi * dersUcreti - odenenToplam
    // =========================================================
    var DEPO_ANAHTAR = "defter_ogrenciler";

    // Kayıttan öğrencileri oku (yoksa boş liste)
    function ogrencileriOku() {
      try {
        var ham = localStorage.getItem(DEPO_ANAHTAR);
        return ham ? JSON.parse(ham) : [];
      } catch (e) {
        return [];
      }
    }

    // Öğrencileri kayda yaz
    function ogrencileriYaz(liste) {
      localStorage.setItem(DEPO_ANAHTAR, JSON.stringify(liste));
    }

    var ogrenciler = ogrencileriOku();

    // Parayı "1.250 ₺" gibi okunaklı yazan küçük yardımcı
    function para(sayi) {
      return sayi.toLocaleString("tr-TR") + " ₺";
    }

    // Metni güvenli yazmak için (ad içindeki < > gibi karakterler)
    function kacis(metin) {
      return String(metin)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // Ekranı (liste + özet kartları) çiz
    function ciz() {
      var liste = document.getElementById("liste");
      var toplamKazanc = 0; // ödenen toplamların toplamı
      var toplamAlacak = 0; // kalan borçların toplamı

      if (ogrenciler.length === 0) {
        liste.innerHTML =
          '<div class="bos-durum">Henüz öğrenci yok.<br>Aşağıdaki + Öğrenci ekle ile başla.</div>';
      } else {
        var html = "";
        ogrenciler.forEach(function (o) {
          var hakedis = o.dersSayisi * o.dersUcreti; // yapılan derslerin tutarı
          var kalan = hakedis - o.odenenToplam;       // kalan borç

          toplamKazanc += o.odenenToplam;
          toplamAlacak += kalan;

          var kaldiSinif = kalan > 0 ? "borc" : "temiz";

          html +=
            '<div class="ogrenci">' +
              '<div class="ust">' +
                '<div class="ad">' + kacis(o.ad) + '</div>' +
                '<div class="ucret">' + para(o.dersUcreti) + ' / ders</div>' +
              '</div>' +
              '<div class="alt">' +
                '<span>' + o.dersSayisi + ' ders</span>' +
                '<span class="ayrac">·</span>' +
                '<span>' + para(o.odenenToplam) + ' ödendi</span>' +
                '<span class="ayrac">·</span>' +
                '<span class="kaldi ' + kaldiSinif + '">' + para(kalan > 0 ? kalan : 0) + ' kaldı</span>' +
              '</div>' +
            '</div>';
        });
        liste.innerHTML = html;
      }

      document.getElementById("ozet-kazanc").textContent = para(toplamKazanc);
      document.getElementById("ozet-alacak").textContent = para(toplamAlacak);
    }

    // ---- Form açma / kapama ----
    var perde = document.getElementById("perde");
    var alanAd = document.getElementById("alan-ad");
    var alanUcret = document.getElementById("alan-ucret");
    var uyari = document.getElementById("uyari");

    function formAc() {
      alanAd.value = "";
      alanUcret.value = "";
      uyariGizle();
      perde.classList.add("acik");
      alanAd.focus();
    }
    function formKapat() {
      perde.classList.remove("acik");
    }
    function uyariGoster(mesaj) {
      uyari.textContent = mesaj;
      uyari.classList.add("gorun");
    }
    function uyariGizle() {
      uyari.classList.remove("gorun");
    }

    // ---- Kaydet ----
    function kaydet() {
      var ad = alanAd.value.trim();
      var ucretMetin = alanUcret.value.trim();
      var ucret = Number(ucretMetin);

      // Basit doğrulama
      if (ad === "") {
        uyariGoster("Lütfen öğrenci adını yaz.");
        return;
      }
      if (ucretMetin === "" || isNaN(ucret) || ucret < 0) {
        uyariGoster("Lütfen geçerli bir ders ücreti gir.");
        return;
      }

      // Yeni öğrenci: 0 ders, 0 ödendi ile başlar
      ogrenciler.push({
        ad: ad,
        dersUcreti: ucret,
        dersSayisi: 0,
        odenenToplam: 0
      });
      ogrencileriYaz(ogrenciler); // kalıcı kayıt
      ciz();
      formKapat();
    }

    // ---- Olay bağlantıları ----
    document.getElementById("ekle-btn").addEventListener("click", formAc);
    document.getElementById("btn-vazgec").addEventListener("click", formKapat);
    document.getElementById("btn-kaydet").addEventListener("click", kaydet);
    // Perdenin boş alanına tıklayınca kapat (panele tıklayınca kapanmasın)
    perde.addEventListener("click", function (e) {
      if (e.target === perde) formKapat();
    });

    // İlk çizim
    ciz();
  </script>
</body>
</html>
