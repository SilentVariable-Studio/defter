<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <!-- Telefon ekranına göre ölçeklenmesi için -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defter</title>
  <style>
    /* ---- Renkler (sıcak "defter/kağıt" teması) ---- */
    :root {
      --krem: #FAEEDA;       /* sıcak krem zemin */
      --kart: #ffffff;       /* beyaz kartlar */
      --kahve-koyu: #412402; /* başlık */
      --kahve: #854F0B;      /* alt başlık / ücret etiketi yazısı */
      --amber: #BA7517;      /* buton */
      --yesil: #0F6E56;      /* kazanç / borcu yok */
      --kirmizi: #A32D2D;    /* alacak / borç */
      --soluk: #9b8a73;      /* öğrenci kartı küçük gri-kahve yazı */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: var(--krem);
      color: var(--kahve-koyu);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      /* Telefonda tek elle okunacak ölçek */
      font-size: 16px;
      line-height: 1.4;
    }

    /* Sayfayı telefon genişliğinde ortalı tut */
    .ekran {
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 18px 36px;
    }

    .baslik {
      margin: 6px 4px 22px;
    }
    .baslik h1 {
      /* Serif yazı tipi sıcaklık katar */
      font-family: Georgia, "Times New Roman", "Cambria", serif;
      font-size: 38px;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--kahve-koyu);
    }
    .baslik p {
      margin: 4px 0 0;
      color: var(--kahve);
      font-size: 14px;
    }

    /* ---- Özet kartları ---- */
    .ozet {
      display: flex;
      gap: 12px;
      margin-bottom: 26px;
    }
    .kart {
      flex: 1;
      background: var(--kart);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(65, 36, 2, 0.06);
    }
    .kart .etiket {
      font-size: 13px;
      color: var(--soluk);
      margin-bottom: 8px;
    }
    .kart .deger {
      font-size: 23px;
      font-weight: 700;
    }
    .kart.kazanc .deger { color: var(--yesil); }
    .kart.alacak .deger { color: var(--kirmizi); }

    /* ---- Öğrenci kartları ---- */
    .liste-baslik {
      font-size: 13px;
      color: var(--kahve);
      margin: 0 4px 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .ogrenci {
      background: var(--kart);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(65, 36, 2, 0.06);
    }
    .ogrenci .ust {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .ogrenci .ad {
      font-size: 18px;
      font-weight: 700;
      color: var(--kahve-koyu);
    }
    /* Ücret etiketi: krem zemin, kahve yazı, hap şekli */
    .ogrenci .ucret {
      font-size: 13px;
      color: var(--kahve);
      background: var(--krem);
      padding: 5px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* Alt satır: küçük gri yazı, üç bilgi yan yana */
    .ogrenci .alt {
      display: flex;
      gap: 6px;
      font-size: 13px;
      color: var(--soluk);
    }
    .ogrenci .alt span { white-space: nowrap; }
    .ogrenci .alt .ayrac { opacity: 0.5; }
    .ogrenci .alt .kaldi.borc { color: var(--kirmizi); font-weight: 600; }
    .ogrenci .alt .kaldi.temiz { color: var(--yesil); font-weight: 600; }

    /* ---- Öğrenci ekle butonu (şimdilik sadece görüntü) ---- */
    .ekle-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: var(--amber);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(186, 117, 23, 0.30);
    }
    .ekle-btn:active { transform: translateY(1px); }

    .dipnot {
      text-align: center;
      color: var(--soluk);
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="ekran">
    <div class="baslik">
      <h1>Defter</h1>
      <p>Özel ders kazanç takibi</p>
    </div>

    <!-- Özet kartları -->
    <div class="ozet">
      <div class="kart kazanc">
        <div class="etiket">Bu ay kazanç</div>
        <div class="deger" id="ozet-kazanc">—</div>
      </div>
      <div class="kart alacak">
        <div class="etiket">Toplam alacak</div>
        <div class="deger" id="ozet-alacak">—</div>
      </div>
    </div>

    <div class="liste-baslik">Öğrenciler</div>
    <div id="liste"><!-- Öğrenci kartları buraya yazılır --></div>

    <!-- Şimdilik sadece görüntü; işlevi sonraki adımda gelecek -->
    <button class="ekle-btn" type="button">+ Öğrenci ekle</button>

    <div class="dipnot">Yukarıdakiler örnek verilerdir</div>
  </div>

  <script>
    // =========================================================
    //  ÖRNEK / GEÇİCİ VERİ
    //  Bu öğrenciler yalnızca görünümü denemek için elle yazıldı.
    //  Gerçek veri ve kayıt sonraki adımda gelecek; burası silinecek.
    // =========================================================
    var ornekOgrenciler = [
      { ad: "Ayşe Yılmaz",  ucret: 300, dersSayisi: 8,  odenen: 2400 }, // borcu yok
      { ad: "Mehmet Demir", ucret: 250, dersSayisi: 6,  odenen: 1000 }, // borcu var
      { ad: "Elif Kaya",    ucret: 350, dersSayisi: 4,  odenen: 700  }  // borcu var
    ];

    // Parayı "1.250 ₺" gibi okunaklı yazan küçük yardımcı
    function para(sayi) {
      return sayi.toLocaleString("tr-TR") + " ₺";
    }

    var toplamKazanc = 0; // ödenen toplam (bu ay kazanç olarak gösteriliyor)
    var toplamAlacak = 0; // kalan borçların toplamı

    var listeHtml = "";
    ornekOgrenciler.forEach(function (o) {
      var hakedis = o.ucret * o.dersSayisi; // yapılan derslerin tutarı
      var kalan = hakedis - o.odenen;        // kalan borç

      toplamKazanc += o.odenen;
      toplamAlacak += kalan;

      var kaldiSinif = kalan > 0 ? "borc" : "temiz";

      listeHtml +=
        '<div class="ogrenci">' +
          '<div class="ust">' +
            '<div class="ad">' + o.ad + '</div>' +
            '<div class="ucret">' + para(o.ucret) + ' / ders</div>' +
          '</div>' +
          '<div class="alt">' +
            '<span>' + o.dersSayisi + ' ders</span>' +
            '<span class="ayrac">·</span>' +
            '<span>' + para(o.odenen) + ' ödendi</span>' +
            '<span class="ayrac">·</span>' +
            '<span class="kaldi ' + kaldiSinif + '">' + para(kalan > 0 ? kalan : 0) + ' kaldı</span>' +
          '</div>' +
        '</div>';
    });

    document.getElementById("liste").innerHTML = listeHtml;
    document.getElementById("ozet-kazanc").textContent = para(toplamKazanc);
    document.getElementById("ozet-alacak").textContent = para(toplamAlacak);
  </script>
</body>
</html>
